apiVersion: v1
kind: Namespace
metadata:
  name: harshithas-ns #-> Give your own namespace with your name Ex: ram-ns

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: password-generator-app  #-> Give your deployment name Ex: test-app
  namespace: harshithas-ns

spec:
  replicas: 2

  selector:
    matchLabels:
      app: password-generator #-> Give your app name app: java-1

  template:
    metadata:
      labels:
        app: password-generator 

    spec:
      containers:
        - name: password-generator-container #-> Give your container name Ex: java-1-container

          image: IMAGE_PLACEHOLDER

          ports:
            - containerPort: 80 #-> make sure you mention container port properly ex: 8000 or 3000 depends on the container running.

---
apiVersion: v1
kind: Service
metadata:
  name: password-generator-service #-> Give your service name Ex: java-1-service
  namespace: harshithas-ns

spec:
  selector:
    app: password-generator

  ports:
    - protocol: TCP
      port: 80 #-> keep the same port for service from pod port as well for best practice.
      targetPort: 80  #-> make sure you mention container port properly ex: 8000 or 3000 depends on the container running.

  type: LoadBalancer